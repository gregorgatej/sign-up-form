<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo-container">
                <img src="assets/images/odin-lined.png" alt="Odin Logo" class="logo-image">
                <h1 class="logo">ODIN</h1>
            </div>
        </div>
        <div class="main">
            <div class="form-section">
                <div class="info-text">
                    <p>This is not a real online service! You know you need something like 
                        this in your life to help you realize your
                        deepest dreams. Sign up <em>now</em> to get started.</p>
                    <p>You <em>know</em> you want to.</p>
                </div>

                <form class="signup-form">
                    <fieldset>
                        <h2 class="form-title">Let's do this!</h2>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="first-name">FIRST NAME</label>
                                <input type="text" id="first-name" name="first-name" required>
                            </div>

                            <div class="form-group">
                                <label for="last-name">LAST NAME</label>
                                <input type="text" id="last-name" name="last-name" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">EMAIL</label>
                                <input type="email" id="email" name="email" required>
                            </div>

                            <div class="form-group">
                                <label for="phone">PHONE NUMBER</label>
                                <input type="tel" id="phone" name="phone">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="password">PASSWORD</label>
                                <input type="password" id="password" name="password" required>
                            </div>
                        
                            <div class="form-group">
                                <label for="confirm-password">CONFIRM PASSWORD</label>
                                <input type="password" id="confirm-password" name="confirm-password" required>
                            </div>
                        </div>
                    </fieldset>

                    <div class="create-account-section">
                        <button type="submit" class="create-account-btn">Create Account</button>
                                    
                        <div class="login-link">
                            <p>Already have an account? <a href="#">Log in</a></p>
                        </div>
                    <div>
                </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
